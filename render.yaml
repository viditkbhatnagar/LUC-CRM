# Render Blueprint — ONE Starter web service ($7/mo, always-on) that serves the
# API + built SPA AND runs the SLA sweep in-process every 15 min
# (RUN_SWEEP_IN_PROCESS=true), so there is no second billable cron service.
#
# Prefer a separate cron instead? Set RUN_SWEEP_IN_PROCESS=false and add a
# `type: cron` service running `node server/src/jobs/slaSweep.js` (see RUNBOOK).
services:
  - type: web
    name: luc-crm
    runtime: node
    region: oregon # pick the region nearest your users / Atlas cluster
    plan: starter # $7/mo, does not sleep (required for the in-process sweep)
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: 'true'
      - key: MESSAGING_DRIVER
        value: console
      - key: STORAGE_DRIVER
        value: s3
      - key: AWS_REGION
        value: us-east-1
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: SEED_ON_BOOT
        value: 'false'
      - key: RUN_SWEEP_IN_PROCESS
        value: 'true'
      # --- secrets: set these in the Render dashboard (never committed) ---
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INGEST_API_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
